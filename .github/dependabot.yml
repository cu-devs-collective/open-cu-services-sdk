version: 2
updates:
  # Client generators dependencies
  - package-ecosystem: pub
    directory: /gen/dart/version
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    versioning-strategy: increase-if-necessary
    groups:
      dart:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /gen/golang/version
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      golang:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /gen/python/version
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      python:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /gen/typescript/version
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    versioning-strategy: increase-if-necessary
    groups:
      typescript:
        patterns:
          - "*"
  # GitHub actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  # Swagger UI dependencies
  - package-ecosystem: npm
    target-branch: swagger-ui-pages
    directory: /swagger-ui
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    versioning-strategy: increase-if-necessary
    groups:
      swagger-ui:
        patterns:
          - "swagger-ui-dist"
