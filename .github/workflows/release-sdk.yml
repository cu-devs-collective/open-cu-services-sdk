name: Release SDK Minor

on:
  workflow_dispatch:
    inputs:
      spec:
        description: Spec key to release SDKs for
        required: true
        type: choice
        options:
          - lmsapi
      langs:
        description: Comma-separated SDK languages to release
        required: true
        type: string
        default: golang,typescript,python,dart
      expected_spec_version:
        description: Guard OpenAPI info.version
        required: true
      dry_run:
        description: Generate and verify without pushing
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-sdk-minor-${{ github.ref }}-${{ inputs.spec }}
  cancel-in-progress: false

jobs:
  release:
    name: Release SDK Minor
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        id: validate
        shell: bash
        env:
          SUPPORTED_LANGS: golang,typescript,python,dart
          INPUT_LANGS: ${{ inputs.langs }}
        run: |
          set -euo pipefail

          raw_langs="${INPUT_LANGS// /}"
          raw_langs="${raw_langs,,}"
          supported_langs="${SUPPORTED_LANGS// /}"
          supported_langs="${supported_langs,,}"
          supported_langs_space="${supported_langs//,/ }"
          langs="${raw_langs//,/ }"
          if [[ -z "$langs" ]]; then
            echo "At least one language must be selected for generation" >&2
            exit 1
          fi

          for language in $langs; do
            if [[ " $supported_langs_space " != *" $language "* ]]; then
              echo "Unsupported language: $language" >&2
              echo "Supported languages: ${supported_langs_space// /, }" >&2
              exit 1
            fi
          done

          echo "langs=$langs" >>"$GITHUB_OUTPUT"
          echo "Languages: $langs"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Add local tools to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >>"$GITHUB_PATH"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install Python tools
        run: python3 -m pip install --upgrade pip uv

      - name: Enable Corepack for Node
        run: corepack enable

      - name: Install tools to generate
        run: make install-tools-generate

      - name: Resolve release
        id: release
        shell: bash
        env:
          INPUT_SPEC: ${{ inputs.spec }}
          INPUT_LANGS: ${{ steps.validate.outputs.langs }}
          INPUT_EXPECTED_SPEC_VERSION: ${{ inputs.expected_spec_version }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          semver_core() {
            local version="$1"
            version="${version%%+*}"
            printf "%s" "${version%%-*}"
          }

          spec="$INPUT_SPEC"
          spec_path="spec/${spec}/${spec}.re.openapi.yaml"
          if [[ ! -f "$spec_path" ]]; then
            echo "Spec file not found: $spec_path" >&2
            exit 1
          fi

          spec_version="$(bin/yq -r '.info.version' "$spec_path")"
          if [[ ! "$spec_version" =~ $semver_re ]]; then
            echo "Spec version must be SemVer without leading v: $spec_version" >&2
            exit 1
          fi
          if [[ -n "$INPUT_EXPECTED_SPEC_VERSION" && "$INPUT_EXPECTED_SPEC_VERSION" != "$spec_version" ]]; then
            echo "Expected spec version does not match OpenAPI info.version:" >&2
            echo "  input: v$INPUT_EXPECTED_SPEC_VERSION" >&2
            echo "  spec : v$spec_version" >&2
            exit 1
          fi

          langs="$INPUT_LANGS"

          {
            echo "spec=$spec"
            echo "spec_version=$spec_version"
            echo "langs=$langs"
          } >>"$GITHUB_OUTPUT"

          echo "Spec: $spec"
          echo "Spec version: $spec_version"
          echo "Languages: $langs"

      - name: Generate and verify SDKs
        id: generate
        shell: bash
        env:
          SPEC: ${{ steps.release.outputs.spec }}
          SPEC_VERSION: ${{ steps.release.outputs.spec_version }}
          LANGS: ${{ steps.release.outputs.langs }}
        run: |
          set -euo pipefail

          latest_sdk_version() {
            local language="$1"
            local spec="$2"
            local pattern="${language}/${spec}/v*"

            git tag -l "$pattern" \
              | sed -E 's#.*/v?([0-9]+\.[0-9]+\.[0-9]+.*)$#\1#' \
              | sort -V \
              | tail -n 1
          }

          semver_core() {
            local version="$1"
            version="${version%%+*}"
            printf "%s" "${version%%-*}"
          }

          bump_minor() {
            local version="$1"
            local core
            core="$(semver_core "$version")"
            IFS=. read -r major minor _patch <<<"$core"
            printf "%s.%s.0" "$major" "$((minor + 1))"
          }

          spec_major="${SPEC_VERSION%%.*}"
          sdk_tags=()

          for language in $LANGS; do
            current_sdk_version="$(latest_sdk_version "$language" "$SPEC")"
            if [[ -z "$current_sdk_version" ]]; then
              echo "No existing SDK tag found for ${language}/${SPEC}, release-spec workflow should be used for the first release" >&2
              exit 1
            fi

            sdk_version="$(bump_minor "$current_sdk_version")"
            sdk_major="${sdk_version%%.*}"
            if [[ "$sdk_major" != "$spec_major" ]]; then
              echo "SDK major must match spec major for ${language}:" >&2
              echo "  sdk : v$sdk_version" >&2
              echo "  spec: v$SPEC_VERSION" >&2
              exit 1
            fi

            echo "Generating ${language}/${SPEC}/v${sdk_version} for spec ${SPEC}/v${SPEC_VERSION}"
            PACKAGE_VERSION="$sdk_version" \
              gen/gen-sdk.sh "$language" -- --sdk-id "$SPEC"

            sdk_tags+=("${language}/${SPEC}/v${sdk_version}")
          done

          {
            echo "sdk_tags=${sdk_tags[*]}"
          } >>"$GITHUB_OUTPUT"

      - name: Create cudevbot token
        id: cudevbot
        if: ${{ inputs.dry_run == false }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.CUDEVBOT_APP_ID || secrets.CUDEVBOT_APP_ID }}
          private-key: ${{ secrets.CUDEVBOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Create SDK branches and tags
        id: tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          SPEC: ${{ steps.release.outputs.spec }}
          SPEC_VERSION: ${{ steps.release.outputs.spec_version }}
          SDK_TAGS: ${{ steps.generate.outputs.sdk_tags }}
        with:
          github-token: ${{ inputs.dry_run == true && github.token || steps.cudevbot.outputs.token }}
          script: |
            const cp = require("node:child_process");
            const fs = require("node:fs");
            const os = require("node:os");
            const path = require("node:path");

            const spec = process.env.SPEC;
            const specVersion = process.env.SPEC_VERSION;
            const sdkTags = process.env.SDK_TAGS.split(/\s+/).filter(Boolean);
            const dryRun = process.env.DRY_RUN === "true";
            const { owner, repo } = context.repo;

            function git(args, options = {}) {
              return cp.execFileSync("git", args, { encoding: "utf8", ...options }).trim();
            }

            function gitZ(args, options = {}) {
              const output = cp.execFileSync("git", args, options);
              if (!output.length) {
                return [];
              }
              return output.subarray(0, output.at(-1) === 0 ? -1 : undefined).toString("utf8").split("\0").filter(Boolean);
            }

            function stagedFiles(root) {
              const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), "release-index-"));
              const indexFile = path.join(tempDir, "index");
              const env = { ...process.env, GIT_INDEX_FILE: indexFile };
              try {
                git(["read-tree", "--empty"], { env });
                cp.execFileSync("git", ["add", "--all", "--force", "--", root], { env });
                return gitZ(["ls-files", "--stage", "-z", "--", root], { env }).map((row) => {
                  const [meta, filePath] = row.split("\t");
                  return { mode: meta.split(" ")[0], path: filePath };
                });
              } finally {
                fs.rmSync(tempDir, { recursive: true, force: true });
              }
            }

            function basePaths(baseRef, root) {
              return new Set(gitZ(["ls-tree", "-r", "--name-only", "-z", baseRef, "--", root]));
            }

            function fetchExistingSdkBranch(branch) {
              try {
                cp.execFileSync("git", ["ls-remote", "--exit-code", "--heads", "origin", branch], { stdio: "ignore" });
              } catch {
                return "";
              }
              git(["fetch", "origin", `refs/heads/${branch}:refs/remotes/origin/${branch}`]);
              return git(["rev-parse", `refs/remotes/origin/${branch}`]);
            }

            function assertLocalTagAbsent(tag) {
              try {
                git(["rev-parse", "-q", "--verify", `refs/tags/${tag}`]);
              } catch (error) {
                if (error.status === 1) {
                  return;
                }
                throw error;
              }
              throw new Error(`Tag already exists: ${tag}`);
            }

            function createLocalSdkBranchCommit(language, baseSha, sdkVersion) {
              const branch = `${language}/${spec}`;
              const previousBranchSha = fetchExistingSdkBranch(branch);
              const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), "release-index-"));
              const indexFile = path.join(tempDir, "index");
              const env = { ...process.env, GIT_INDEX_FILE: indexFile };

              try {
                git(["read-tree", baseSha], { env });
                fs.rmSync(".gitignore", { force: true });
                fs.rmSync(`${language}/.gitignore`, { force: true });
                try {
                  cp.execFileSync("git", ["update-index", "--remove", "--", `${language}/.gitignore`], { env, stdio: "ignore" });
                } catch {
                  // This means language missing ignore files, but this is accepted
                }
                cp.execFileSync("git", ["add", `${language}/${spec}`], { env });

                const tree = git(["write-tree"], { env });
                const commitArgs = [
                  "commit-tree",
                  tree,
                  "-p",
                  baseSha,
                ];
                if (previousBranchSha) {
                  commitArgs.push("-p", previousBranchSha);
                }
                commitArgs.push(
                  "-m",
                  `chore(release): SDK ${language}/${spec} v${sdkVersion}`,
                  "-m",
                  `SDK based on spec/${spec}/v${specVersion}`,
                );
                return { branch, sha: git(commitArgs) };
              } finally {
                fs.rmSync(tempDir, { recursive: true, force: true });
              }
            }

            async function createBlob(filePath, mode) {
              const content = mode === "120000"
                ? Buffer.from(fs.readlinkSync(filePath), "utf8").toString("base64")
                : fs.readFileSync(filePath).toString("base64");
              const { data } = await github.rest.git.createBlob({
                owner,
                repo,
                content,
                encoding: "base64",
              });
              return data.sha;
            }

            async function createTreeFromRoots(baseTree, deletionBaseRef, roots, extraDeletions = []) {
              const tree = [];
              for (const filePath of extraDeletions) {
                tree.push({ path: filePath, sha: null });
              }

              for (const root of roots) {
                const files = stagedFiles(root);
                if (!files.length) {
                  throw new Error(`No releasable files found under ${root}`);
                }

                const addedPaths = new Set(files.map((file) => file.path));
                for (const filePath of basePaths(deletionBaseRef, root)) {
                  if (!addedPaths.has(filePath)) {
                    tree.push({ path: filePath, sha: null });
                  }
                }

                for (const file of files) {
                  tree.push({
                    path: file.path,
                    mode: file.mode,
                    type: "blob",
                    sha: await createBlob(file.path, file.mode),
                  });
                }
              }

              const { data } = await github.rest.git.createTree({
                owner,
                repo,
                base_tree: baseTree,
                tree,
              });
              return data.sha;
            }

            function ensureVerified(object, kind, label) {
              if (object.verification?.verified === true) {
                return;
              }
              throw new Error(`GitHub did not verify ${kind} ${label}: ${object.verification?.reason ?? "missing verification response"}`);
            }

            async function createCommit(message, tree, parents, label) {
              const { data } = await github.rest.git.createCommit({
                owner,
                repo,
                message,
                tree,
                parents,
              });
              ensureVerified(data, "commit", label);
              return data.sha;
            }

            async function getRef(ref) {
              try {
                const { data } = await github.rest.git.getRef({ owner, repo, ref });
                return data;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            async function assertTagAbsent(tag) {
              if (await getRef(`tags/${tag}`)) {
                throw new Error(`Tag already exists: ${tag}`);
              }
            }

            async function createOrUpdateRef(ref, sha) {
              if (await getRef(ref)) {
                await github.rest.git.updateRef({ owner, repo, ref, sha, force: false });
              } else {
                await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha });
              }
            }

            async function deleteRef(ref) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function createTag(tag, message, targetSha) {
              const { data } = await github.rest.git.createTag({
                owner,
                repo,
                tag,
                message,
                object: targetSha,
                type: "commit",
              });
              ensureVerified(data, "tag", tag);
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: data.sha });
            }

            async function remoteBranchSha(branch) {
              const ref = await getRef(`heads/${branch}`);
              return ref?.object?.sha ?? "";
            }

            async function createSdkBranchCommit(language, baseSha, baseTree, sdkVersion) {
              const branch = `${language}/${spec}`;
              const previousBranchSha = await remoteBranchSha(branch);
              const tree = await createTreeFromRoots(baseTree, baseSha, [branch], [`${language}/.gitignore`]);
              const parents = previousBranchSha ? [baseSha, previousBranchSha] : [baseSha];
              const sha = await createCommit(
                `chore(release): SDK ${language}/${spec} v${sdkVersion}\n\nSDK based on spec/${spec}/v${specVersion}`,
                tree,
                parents,
                `${language}/${spec} v${sdkVersion}`,
              );
              await deleteRef(`tags/${branch}`);
              await createOrUpdateRef(`heads/${branch}`, sha);
              return { branch, sha };
            }

            for (const tag of sdkTags) {
              if (dryRun) {
                assertLocalTagAbsent(tag);
              } else {
                await assertTagAbsent(tag);
              }
            }

            const baseSha = git(["rev-parse", "HEAD"]);
            const baseTree = git(["rev-parse", "HEAD^{tree}"]);
            const sdkBranches = [];

            if (dryRun) {
              git(["config", "user.name", "github-actions[bot]"]);
              git(["config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"]);

              for (const tag of sdkTags) {
                const language = tag.split("/")[0];
                const sdkVersion = tag.split("/").at(-1).replace(/^v/, "");
                const { branch, sha } = createLocalSdkBranchCommit(language, baseSha, sdkVersion);
                try {
                  git(["tag", "-d", branch]);
                } catch {
                  // Deleting a non-existing local branch-name tag is accepted
                }
                git(["tag", "-a", tag, sha, "-m", `Release ${tag} based on spec/${spec}/v${specVersion}`]);
                sdkBranches.push(`${branch}=${sha}`);
              }

              core.setOutput("base_sha", baseSha);
              core.setOutput("sdk_tags", sdkTags.join(" "));
              core.setOutput("sdk_branches", sdkBranches.join(" "));
              return;
            }

            for (const tag of sdkTags) {
              const language = tag.split("/")[0];
              const sdkVersion = tag.split("/").at(-1).replace(/^v/, "");
              const { branch, sha } = await createSdkBranchCommit(language, baseSha, baseTree, sdkVersion);
              await createTag(tag, `Release ${tag} based on spec/${spec}/v${specVersion}`, sha);
              sdkBranches.push(`${branch}=${sha}`);
            }

            core.setOutput("base_sha", baseSha);
            core.setOutput("sdk_tags", sdkTags.join(" "));
            core.setOutput("sdk_branches", sdkBranches.join(" "));

      - name: Print release summary
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          BASE_SHA: ${{ steps.tag.outputs.base_sha }}
          LANGS: ${{ steps.release.outputs.langs }}
          SDK_TAGS: ${{ steps.tag.outputs.sdk_tags }}
          SDK_BRANCHES: ${{ steps.tag.outputs.sdk_branches }}
        run: |
          echo "# Release summary"
          echo "Is dry run: ${DRY_RUN}"
          echo "Base commit: ${BASE_SHA}"
          echo "Languages: ${LANGS}"
          echo "SDK branches: ${SDK_BRANCHES}"
          echo "SDK tags: ${SDK_TAGS}"

      # TODO: later add GitHub release tab creation
