name: Release Spec and SDKs

on:
  workflow_dispatch:
    inputs:
      spec:
        description: Spec key to release
        required: true
        type: choice
        options:
          - lmsapi
      langs:
        description: Comma-separated SDK languages to release, can be empty
        required: false
        type: string
        default: golang,typescript,python,dart
      change_type:
        description: SemVer bump for the spec and SDKs
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Generate and verify locally without publishing
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-spec-${{ github.ref }}-${{ inputs.spec }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      spec: ${{ steps.release.outputs.spec }}
      spec_version: ${{ steps.release.outputs.spec_version }}
      spec_tag: ${{ steps.release.outputs.spec_tag }}
      langs: ${{ steps.release.outputs.langs }}
      sdk_versions: ${{ steps.release.outputs.sdk_versions }}
      sdk_tags: ${{ steps.release.outputs.sdk_tags }}
    steps:
      - name: Validate inputs
        id: validate
        shell: bash
        env:
          SUPPORTED_LANGS: golang,typescript,python,dart
          INPUT_LANGS: ${{ inputs.langs }}
        run: |
          set -euo pipefail

          raw_langs="${INPUT_LANGS// /}"
          raw_langs="${raw_langs,,}"
          supported_langs="${SUPPORTED_LANGS// /}"
          supported_langs="${supported_langs,,}"
          supported_langs_space="${supported_langs//,/ }"
          langs="${raw_langs//,/ }"

          for language in $langs; do
            if [[ " $supported_langs_space " != *" $language "* ]]; then
              echo "Unsupported language: $language" >&2
              echo "Supported languages: ${supported_langs_space// /, }" >&2
              exit 1
            fi
          done

          echo "langs=$langs" >>"$GITHUB_OUTPUT"
          echo "Languages: $langs"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Install tools to lint specs
        run: make install-tools-lint-specs

      - name: Lint specs
        run: |
          make lint-specs \
            OPENAPI_SPEC_FILES="spec/${{ inputs.spec }}/${{ inputs.spec }}.re.openapi.yaml"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install Python tools
        run: python3 -m pip install --upgrade pip uv

      - name: Enable Corepack for Node
        run: corepack enable

      - name: Install tools to generate
        run: make install-tools-generate

      - name: Resolve release
        id: release
        shell: bash
        env:
          INPUT_SPEC: ${{ inputs.spec }}
          INPUT_CHANGE_TYPE: ${{ inputs.change_type }}
          INPUT_LANGS: ${{ steps.validate.outputs.langs }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          semver_core() {
            local version="$1"
            version="${version%%+*}"
            printf "%s" "${version%%-*}"
          }

          bump_version() {
            local version="$1"
            local change_type="$2"
            local core
            core="$(semver_core "$version")"
            IFS=. read -r major minor patch <<<"$core"
            case "$change_type" in
              patch) printf "%s.%s.%s" "$major" "$minor" "$((patch + 1))" ;;
              minor) printf "%s.%s.0" "$major" "$((minor + 1))" ;;
              major) printf "%s.0.0" "$((major + 1))" ;;
            esac
          }

          latest_sdk_version() {
            local language="$1"
            local spec="$2"
            local pattern="${language}/${spec}/v*"

            git tag -l "$pattern" \
              | sed -E 's#.*/v?([0-9]+\.[0-9]+\.[0-9]+.*)$#\1#' \
              | sort -V \
              | tail -n 1
          }

          spec="$INPUT_SPEC"
          spec_path="spec/${spec}/${spec}.re.openapi.yaml"
          if [[ ! -f "$spec_path" ]]; then
            echo "Spec file not found: $spec_path" >&2
            exit 1
          fi

          current_spec_version="$(bin/yq -r '.info.version' "$spec_path")"
          if [[ ! "$current_spec_version" =~ $semver_re ]]; then
            echo "Spec version must be SemVer without leading v: $current_spec_version" >&2
            exit 1
          fi

          spec_version="$(bump_version "$current_spec_version" "$INPUT_CHANGE_TYPE")"
          spec_major="${spec_version%%.*}"
          spec_tag="spec/${spec}/v${spec_version}"
          if git rev-parse -q --verify "refs/tags/${spec_tag}" >/dev/null; then
            echo "Tag already exists: $spec_tag" >&2
            exit 1
          fi

          langs="$INPUT_LANGS"

          sdk_versions=()
          sdk_tags=()
          for language in $langs; do
            current_sdk_version="$(latest_sdk_version "$language" "$spec")"
            if [[ -z "$current_sdk_version" ]]; then
              sdk_version="$spec_version"
            else
              sdk_version="$(bump_version "$current_sdk_version" "$INPUT_CHANGE_TYPE")"
            fi

            sdk_major="${sdk_version%%.*}"
            if [[ "$sdk_major" != "$spec_major" ]]; then
              echo "SDK major must match spec major for ${language}:" >&2
              echo "  sdk : v$sdk_version" >&2
              echo "  spec: v$spec_version" >&2
              exit 1
            fi

            sdk_tag="${language}/${spec}/v${sdk_version}"
            if git rev-parse -q --verify "refs/tags/${sdk_tag}" >/dev/null; then
              echo "Tag already exists: $sdk_tag" >&2
              exit 1
            fi

            sdk_versions+=("${language}=${sdk_version}")
            sdk_tags+=("$sdk_tag")
          done

          SPEC_VERSION="$spec_version" bin/yq -i '.info.version = strenv(SPEC_VERSION)' "$spec_path"

          {
            echo "spec=$spec"
            echo "spec_version=$spec_version"
            echo "spec_tag=$spec_tag"
            echo "langs=$langs"
            echo "sdk_versions=${sdk_versions[*]}"
            echo "sdk_tags=${sdk_tags[*]}"
          } >>"$GITHUB_OUTPUT"

          echo "Spec: $spec"
          echo "Previous spec version: $current_spec_version"
          echo "New spec version: $spec_version"
          echo "Spec tag: $spec_tag"
          echo "Languages: $langs"
          echo "SDK versions: ${sdk_versions[*]}"
          echo "SDK tags: ${sdk_tags[*]}"

      - name: Generate and verify SDKs
        shell: bash
        env:
          SPEC: ${{ steps.release.outputs.spec }}
          SPEC_VERSION: ${{ steps.release.outputs.spec_version }}
          SDK_VERSIONS: ${{ steps.release.outputs.sdk_versions }}
        run: |
          set -euo pipefail

          for pair in $SDK_VERSIONS; do
            language="${pair%%=*}"
            sdk_version="${pair#*=}"
            echo "Generating ${language}/${SPEC}/v${sdk_version} for spec ${SPEC}/v${SPEC_VERSION}"
            PACKAGE_VERSION="$sdk_version" \
              gen/gen-sdk.sh "$language" -- --sdk-id "$SPEC"
          done

      - name: Pack release workspace
        shell: bash
        env:
          SPEC: ${{ steps.release.outputs.spec }}
          LANGS: ${{ steps.release.outputs.langs }}
        run: |
          set -euo pipefail

          paths=("spec/${SPEC}")
          for language in $LANGS; do
            paths+=("${language}/${SPEC}")
          done

          tar \
            --exclude-vcs-ignores \
            -czf release-workspace.tgz \
            "${paths[@]}"

      - name: Upload release workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-workspace
          path: release-workspace.tgz
          if-no-files-found: error

      - name: Print dry-run result
        if: ${{ inputs.dry_run }}
        env:
          SPEC_TAG: ${{ steps.release.outputs.spec_tag }}
          LANGS: ${{ steps.release.outputs.langs }}
          SDK_TAGS: ${{ steps.release.outputs.sdk_tags }}
        run: |
          echo "Dry run completed."
          echo "Spec tag: ${SPEC_TAG}"
          echo "Languages: ${LANGS}"
          echo "SDK tags: ${SDK_TAGS}"

  release:
    name: Publish Release
    needs: prepare
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: release-approval
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-workspace

      - name: Restore release workspace
        run: tar -xzf release-workspace.tgz

      - name: Create release commit, SDK branches and tags
        id: tag
        shell: bash
        env:
          SPEC: ${{ needs.prepare.outputs.spec }}
          SPEC_VERSION: ${{ needs.prepare.outputs.spec_version }}
          SPEC_TAG: ${{ needs.prepare.outputs.spec_tag }}
          SDK_TAGS: ${{ needs.prepare.outputs.sdk_tags }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          add_sdk_files_to_index() {
            local language="$1"
            local spec="$2"
            local index_file="$3"

            GIT_INDEX_FILE="$index_file" git add "${language}/${spec}"
          }

          fetch_existing_sdk_branch() {
            local branch="$1"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null; then
              git fetch origin "refs/heads/${branch}:refs/remotes/origin/${branch}"
              git rev-parse "refs/remotes/origin/${branch}"
            fi
          }

          create_sdk_branch_commit() {
            local language="$1"
            local spec="$2"
            local base_sha="$3"
            local sdk_version="$4"
            local spec_version="$5"
            local previous_branch_sha="${6:-}"
            local index_file
            index_file="$(mktemp)"

            GIT_INDEX_FILE="$index_file" git read-tree "$base_sha"
            rm -f .gitignore "${language}/.gitignore"
            GIT_INDEX_FILE="$index_file" git update-index \
              --remove \
              -- "${language}/.gitignore" >/dev/null 2>&1 || true
            add_sdk_files_to_index "$language" "$spec" "$index_file"

            local tree
            tree="$(GIT_INDEX_FILE="$index_file" git write-tree)"
            local -a parents=(-p "$base_sha")
            if [[ -n "$previous_branch_sha" ]]; then
              parents+=(-p "$previous_branch_sha")
            fi
            git commit-tree "$tree" \
              "${parents[@]}" \
              -m "chore(release): SDK ${language}/${spec} v${sdk_version}" -m "SDK based on spec/${spec}/v${spec_version}"
          }

          git add "spec/${SPEC}/${SPEC}.re.openapi.yaml"
          git commit -m "chore(release): spec ${SPEC} v${SPEC_VERSION}"
          release_sha="$(git rev-parse HEAD)"

          git tag -a "$SPEC_TAG" "$release_sha" -m "Release spec ${SPEC} v${SPEC_VERSION}"
          sdk_branches=()
          for tag in $SDK_TAGS; do
            language="${tag%%/*}"
            sdk_version="${tag##*/}"
            sdk_version="${sdk_version#v}"
            sdk_branch="${language}/${SPEC}"
            previous_branch_sha="$(fetch_existing_sdk_branch "$sdk_branch")"
            sdk_branch_sha="$(create_sdk_branch_commit "$language" "$SPEC" "$release_sha" "$sdk_version" "$SPEC_VERSION" "$previous_branch_sha")"
            git tag -a "$tag" "$sdk_branch_sha" -m "Release ${tag} based on spec/${SPEC}/v${SPEC_VERSION}"

            sdk_branches+=("${sdk_branch}=${sdk_branch_sha}")
          done

          {
            echo "release_sha=$release_sha"
            echo "sdk_branches=${sdk_branches[*]}"
          } >>"$GITHUB_OUTPUT"

      - name: Push release commit and tags
        shell: bash
        env:
          SPEC_TAG: ${{ needs.prepare.outputs.spec_tag }}
          SDK_TAGS: ${{ needs.prepare.outputs.sdk_tags }}
          SDK_BRANCHES: ${{ steps.tag.outputs.sdk_branches }}
        run: |
          set -euo pipefail

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "$SPEC_TAG"
          for pair in $SDK_BRANCHES; do
            branch="${pair%%=*}"
            sha="${pair#*=}"
            git push origin ":refs/tags/${branch}" >/dev/null 2>&1 || true
            git push origin "${sha}:refs/heads/${branch}"
          done
          for tag in $SDK_TAGS; do
            git push origin "$tag"
          done

      # TODO: later add GitHub release tab creation
