name: Deploy Swagger UI

on:
  push:
    branches:
      - swagger-ui-pages
    paths:
      - "swagger-ui/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: swagger-ui-pages
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_PATH: swagger-ui-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: swagger-ui-pages

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Swagger UI package
        working-directory: swagger-ui
        run: npm install

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$PAGES_ARTIFACT_PATH"
          mkdir -p "$PAGES_ARTIFACT_PATH/api-docs"
          cp -R swagger-ui/node_modules/swagger-ui-dist/. "$PAGES_ARTIFACT_PATH/api-docs/"
          cp swagger-ui/swagger-initializer.js "$PAGES_ARTIFACT_PATH/api-docs/swagger-initializer.js"

          test -f "$PAGES_ARTIFACT_PATH/api-docs/index.html"
          test -f "$PAGES_ARTIFACT_PATH/api-docs/swagger-initializer.js"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ env.PAGES_ARTIFACT_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: swagger-ui-pages
      url: ${{ format('{0}api-docs/', steps.deployment.outputs.page_url) }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
