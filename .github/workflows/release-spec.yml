name: Release Spec and SDKs

on:
  workflow_dispatch:
    inputs:
      spec:
        description: Spec key to release
        required: true
        type: choice
        options:
          - lmsapi
      langs:
        description: Comma-separated SDK languages to release, can be empty
        required: false
        type: string
        default: golang,typescript,python,dart
      change_type:
        description: SemVer bump for the spec and SDKs
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Generate and verify without pushing
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-spec-${{ github.ref }}-${{ inputs.spec }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      spec: ${{ steps.release.outputs.spec }}
      spec_version: ${{ steps.release.outputs.spec_version }}
      spec_tag: ${{ steps.release.outputs.spec_tag }}
      langs: ${{ steps.release.outputs.langs }}
      sdk_versions: ${{ steps.release.outputs.sdk_versions }}
      sdk_tags: ${{ steps.release.outputs.sdk_tags }}
    steps:
      - name: Validate inputs
        id: validate
        shell: bash
        env:
          SUPPORTED_LANGS: golang,typescript,python,dart
          INPUT_LANGS: ${{ inputs.langs }}
        run: |
          set -euo pipefail

          raw_langs="${INPUT_LANGS// /}"
          raw_langs="${raw_langs,,}"
          supported_langs="${SUPPORTED_LANGS// /}"
          supported_langs="${supported_langs,,}"
          supported_langs_space="${supported_langs//,/ }"
          langs="${raw_langs//,/ }"

          for language in $langs; do
            if [[ " $supported_langs_space " != *" $language "* ]]; then
              echo "Unsupported language: $language" >&2
              echo "Supported languages: ${supported_langs_space// /, }" >&2
              exit 1
            fi
          done

          echo "langs=$langs" >>"$GITHUB_OUTPUT"
          echo "Languages: $langs"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Add local tools to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >>"$GITHUB_PATH"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Install tools to lint specs
        run: make install-tools-lint-specs

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install Python tools
        run: python3 -m pip install --upgrade pip uv

      - name: Enable Corepack for Node
        run: corepack enable

      - name: Install tools to generate
        run: make install-tools-generate

      - name: Resolve release
        id: release
        shell: bash
        env:
          INPUT_SPEC: ${{ inputs.spec }}
          INPUT_CHANGE_TYPE: ${{ inputs.change_type }}
          INPUT_LANGS: ${{ steps.validate.outputs.langs }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          semver_core() {
            local version="$1"
            version="${version%%+*}"
            printf "%s" "${version%%-*}"
          }

          bump_version() {
            local version="$1"
            local change_type="$2"
            local core
            core="$(semver_core "$version")"
            IFS=. read -r major minor patch <<<"$core"
            case "$change_type" in
              patch) printf "%s.%s.%s" "$major" "$minor" "$((patch + 1))" ;;
              minor) printf "%s.%s.0" "$major" "$((minor + 1))" ;;
              major) printf "%s.0.0" "$((major + 1))" ;;
            esac
          }

          latest_sdk_version() {
            local language="$1"
            local spec="$2"
            local pattern="${language}/${spec}/v*"

            git tag -l "$pattern" \
              | sed -E 's#.*/v?([0-9]+\.[0-9]+\.[0-9]+.*)$#\1#' \
              | sort -V \
              | tail -n 1
          }

          update_spec_release_fields() {
            local spec_path="$1"
            local spec_version="$2"
            local release_date="$3"

            python3 - "$spec_path" "$spec_version" "$release_date" <<'PY'
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          spec_version = sys.argv[2]
          release_date = sys.argv[3]
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)

          def indent_of(line):
              return len(line) - len(line.lstrip(" "))

          top_level_re = re.compile(r"^[A-Za-z0-9_.-]+:")
          info_start = None
          for index, line in enumerate(lines):
              if re.match(r"^info:\s*(?:#.*)?(?:\r?\n)?$", line):
                  info_start = index
                  break

          if info_start is None:
              raise SystemExit(f"Missing top-level info block in {path}")

          info_end = len(lines)
          for index in range(info_start + 1, len(lines)):
              line = lines[index]
              if line.strip() and not line.lstrip().startswith("#") and top_level_re.match(line):
                  info_end = index
                  break

          version_updated = False
          x_re_start = None
          x_re_indent = None
          for index in range(info_start + 1, info_end):
              line = lines[index]
              if re.match(r"^\s+version\s*:", line):
                  lines[index] = re.sub(
                      r"^(\s*version\s*:\s*).*?(\s*(?:#.*)?)?(\r?\n)?$",
                      rf"\g<1>{spec_version}\2\3",
                      line,
                  )
                  version_updated = True
              if re.match(r"^\s+x-re\s*:\s*(?:#.*)?(?:\r?\n)?$", line):
                  x_re_start = index
                  x_re_indent = indent_of(line)

          if not version_updated:
              raise SystemExit(f"Missing info.version in {path}")

          release_date_updated = False
          if x_re_start is not None:
              x_re_end = info_end
              for index in range(x_re_start + 1, info_end):
                  line = lines[index]
                  if line.strip() and not line.lstrip().startswith("#") and indent_of(line) <= x_re_indent:
                      x_re_end = index
                      break

              for index in range(x_re_start + 1, x_re_end):
                  line = lines[index]
                  if re.match(r"^\s+releaseDate\s*:", line):
                      lines[index] = re.sub(
                          r"^(\s*releaseDate\s*:\s*).*?(\s*(?:#.*)?)?(\r?\n)?$",
                          rf"\g<1>{release_date}\2\3",
                          line,
                      )
                      release_date_updated = True
                      break

          path.write_text("".join(lines), encoding="utf-8")
          print(f"Updated info.version to {spec_version}")
          if release_date_updated:
              print(f"Updated info.x-re.releaseDate to {release_date}")
          elif x_re_start is not None:
              print("info.x-re.releaseDate is absent, leaving it unchanged")
          else:
              print("info.x-re is absent, leaving releaseDate unchanged")
          PY
          }

          spec="$INPUT_SPEC"
          spec_path="spec/${spec}/${spec}.re.openapi.yaml"
          if [[ ! -f "$spec_path" ]]; then
            echo "Spec file not found: $spec_path" >&2
            exit 1
          fi

          current_spec_version="$(bin/yq -r '.info.version' "$spec_path")"
          if [[ ! "$current_spec_version" =~ $semver_re ]]; then
            echo "Spec version must be SemVer without leading v: $current_spec_version" >&2
            exit 1
          fi

          spec_version="$(bump_version "$current_spec_version" "$INPUT_CHANGE_TYPE")"
          spec_major="${spec_version%%.*}"
          spec_tag="spec/${spec}/v${spec_version}"
          if git rev-parse -q --verify "refs/tags/${spec_tag}" >/dev/null; then
            echo "Tag already exists: $spec_tag" >&2
            exit 1
          fi

          langs="$INPUT_LANGS"

          sdk_versions=()
          sdk_tags=()
          for language in $langs; do
            current_sdk_version="$(latest_sdk_version "$language" "$spec")"
            if [[ -z "$current_sdk_version" ]]; then
              sdk_version="$spec_version"
            else
              sdk_version="$(bump_version "$current_sdk_version" "$INPUT_CHANGE_TYPE")"
            fi

            sdk_major="${sdk_version%%.*}"
            if [[ "$sdk_major" != "$spec_major" ]]; then
              echo "SDK major must match spec major for ${language}:" >&2
              echo "  sdk : v$sdk_version" >&2
              echo "  spec: v$spec_version" >&2
              exit 1
            fi

            sdk_tag="${language}/${spec}/v${sdk_version}"
            if git rev-parse -q --verify "refs/tags/${sdk_tag}" >/dev/null; then
              echo "Tag already exists: $sdk_tag" >&2
              exit 1
            fi

            sdk_versions+=("${language}=${sdk_version}")
            sdk_tags+=("$sdk_tag")
          done

          release_date="$(TZ=Europe/Moscow date +%F)"
          update_spec_release_fields "$spec_path" "$spec_version" "$release_date"

          {
            echo "spec=$spec"
            echo "spec_version=$spec_version"
            echo "spec_tag=$spec_tag"
            echo "langs=$langs"
            echo "sdk_versions=${sdk_versions[*]}"
            echo "sdk_tags=${sdk_tags[*]}"
          } >>"$GITHUB_OUTPUT"

          echo "Spec: $spec"
          echo "Previous spec version: $current_spec_version"
          echo "New spec version: $spec_version"
          echo "Spec tag: $spec_tag"
          echo "Languages: $langs"
          echo "SDK versions: ${sdk_versions[*]}"
          echo "SDK tags: ${sdk_tags[*]}"

      - name: Lint release spec
        env:
          SPEC: ${{ steps.release.outputs.spec }}
        run: |
          make lint-specs \
            OPENAPI_SPEC_FILES="spec/${SPEC}/${SPEC}.re.openapi.yaml"

      - name: Generate and verify SDKs
        shell: bash
        env:
          SPEC: ${{ steps.release.outputs.spec }}
          SPEC_VERSION: ${{ steps.release.outputs.spec_version }}
          SDK_VERSIONS: ${{ steps.release.outputs.sdk_versions }}
        run: |
          set -euo pipefail

          for pair in $SDK_VERSIONS; do
            language="${pair%%=*}"
            sdk_version="${pair#*=}"
            echo "Generating ${language}/${SPEC}/v${sdk_version} for spec ${SPEC}/v${SPEC_VERSION}"
            PACKAGE_VERSION="$sdk_version" \
              gen/gen-sdk.sh "$language" -- --sdk-id "$SPEC"
          done

      - name: Pack release workspace
        shell: bash
        env:
          SPEC: ${{ steps.release.outputs.spec }}
          LANGS: ${{ steps.release.outputs.langs }}
        run: |
          set -euo pipefail

          tar \
            --exclude-vcs-ignores \
            -cf release-workspace.tar \
            "spec/${SPEC}"

          for language in $LANGS; do
            tar \
              --exclude-vcs-ignores \
              --transform "s#^\\.#${language}/${SPEC}#" \
              -rf release-workspace.tar \
              -C "${language}/${SPEC}" \
              .
          done

          gzip -f release-workspace.tar
          mv release-workspace.tar.gz release-workspace.tgz

      - name: Upload release workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-workspace
          path: release-workspace.tgz
          if-no-files-found: error

      - name: Print release summary
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          SPEC_TAG: ${{ steps.release.outputs.spec_tag }}
          LANGS: ${{ steps.release.outputs.langs }}
          SDK_TAGS: ${{ steps.release.outputs.sdk_tags }}
        run: |
          echo "# Release summary"
          echo "Is dry run: ${DRY_RUN}"
          echo "Spec tag: ${SPEC_TAG}"
          echo "Languages: ${LANGS}"
          echo "SDK tags: ${SDK_TAGS}"

  release:
    name: Publish Release
    needs: prepare
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: release-spec
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download release workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-workspace

      - name: Restore release workspace
        run: tar -xzf release-workspace.tgz

      - name: Create cudevbot token
        id: cudevbot
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.CUDEVBOT_APP_ID }}
          private-key: ${{ secrets.CUDEVBOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Publish release commit, SDK branches and tags
        id: publish
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SPEC: ${{ needs.prepare.outputs.spec }}
          SPEC_VERSION: ${{ needs.prepare.outputs.spec_version }}
          SPEC_TAG: ${{ needs.prepare.outputs.spec_tag }}
          SDK_TAGS: ${{ needs.prepare.outputs.sdk_tags }}
        with:
          github-token: ${{ steps.cudevbot.outputs.token }}
          script: |
            const cp = require("node:child_process");
            const fs = require("node:fs");
            const os = require("node:os");
            const path = require("node:path");

            const spec = process.env.SPEC;
            const specVersion = process.env.SPEC_VERSION;
            const specTag = process.env.SPEC_TAG;
            const sdkTags = process.env.SDK_TAGS ? process.env.SDK_TAGS.split(/\s+/).filter(Boolean) : [];
            const targetBranch = process.env.GITHUB_REF_NAME;
            const { owner, repo } = context.repo;

            function git(args, options = {}) {
              return cp.execFileSync("git", args, { encoding: "utf8", ...options }).trim();
            }

            function gitZ(args, options = {}) {
              const output = cp.execFileSync("git", args, options);
              if (!output.length) {
                return [];
              }
              return output.subarray(0, output.at(-1) === 0 ? -1 : undefined).toString("utf8").split("\0").filter(Boolean);
            }

            function stagedFiles(root) {
              const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), "release-index-"));
              const indexFile = path.join(tempDir, "index");
              const env = { ...process.env, GIT_INDEX_FILE: indexFile };
              try {
                git(["read-tree", "--empty"], { env });
                cp.execFileSync("git", ["add", "--all", "--force", "--", root], { env });
                return gitZ(["ls-files", "--stage", "-z", "--", root], { env }).map((row) => {
                  const [meta, filePath] = row.split("\t");
                  return { mode: meta.split(" ")[0], path: filePath };
                });
              } finally {
                fs.rmSync(tempDir, { recursive: true, force: true });
              }
            }

            function basePaths(baseRef, root) {
              return new Set(gitZ(["ls-tree", "-r", "--name-only", "-z", baseRef, "--", root]));
            }

            async function createBlob(filePath, mode) {
              const content = mode === "120000"
                ? Buffer.from(fs.readlinkSync(filePath), "utf8").toString("base64")
                : fs.readFileSync(filePath).toString("base64");
              const { data } = await github.rest.git.createBlob({
                owner,
                repo,
                content,
                encoding: "base64",
              });
              return data.sha;
            }

            async function createTreeFromRoots(baseTree, deletionBaseRef, roots, extraDeletions = []) {
              const tree = [];
              for (const filePath of extraDeletions) {
                tree.push({ path: filePath, sha: null });
              }

              for (const root of roots) {
                const files = stagedFiles(root);
                if (!files.length) {
                  throw new Error(`No releasable files found under ${root}`);
                }

                const addedPaths = new Set(files.map((file) => file.path));
                if (deletionBaseRef) {
                  for (const filePath of basePaths(deletionBaseRef, root)) {
                    if (!addedPaths.has(filePath)) {
                      tree.push({ path: filePath, sha: null });
                    }
                  }
                }

                for (const file of files) {
                  tree.push({
                    path: file.path,
                    mode: file.mode,
                    type: "blob",
                    sha: await createBlob(file.path, file.mode),
                  });
                }
              }

              const { data } = await github.rest.git.createTree({
                owner,
                repo,
                base_tree: baseTree,
                tree,
              });
              return data.sha;
            }

            function ensureVerified(object, kind, label) {
              if (object.verification?.verified === true) {
                return;
              }
              throw new Error(`GitHub did not verify ${kind} ${label}: ${object.verification?.reason ?? "missing verification response"}`);
            }

            async function createCommit(message, tree, parents, label) {
              const { data } = await github.rest.git.createCommit({
                owner,
                repo,
                message,
                tree,
                parents,
              });
              ensureVerified(data, "commit", label);
              return data.sha;
            }

            async function getRef(ref) {
              try {
                const { data } = await github.rest.git.getRef({ owner, repo, ref });
                return data;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            async function assertTagAbsent(tag) {
              if (await getRef(`tags/${tag}`)) {
                throw new Error(`Tag already exists: ${tag}`);
              }
            }

            async function createOrUpdateRef(ref, sha) {
              if (await getRef(ref)) {
                await github.rest.git.updateRef({ owner, repo, ref, sha, force: false });
              } else {
                await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha });
              }
            }

            async function deleteRef(ref) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function createTag(tag, message, targetSha) {
              const { data } = await github.rest.git.createTag({
                owner,
                repo,
                tag,
                message,
                object: targetSha,
                type: "commit",
              });
              ensureVerified(data, "tag", tag);
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: data.sha });
            }

            async function remoteBranchSha(branch) {
              const ref = await getRef(`heads/${branch}`);
              return ref?.object?.sha ?? "";
            }

            async function createSdkBranchCommit(language, baseSha, baseTree, deletionBaseRef, sdkVersion) {
              const branch = `${language}/${spec}`;
              const previousBranchSha = await remoteBranchSha(branch);
              const tree = await createTreeFromRoots(baseTree, deletionBaseRef, [branch], [`${language}/.gitignore`]);
              const parents = previousBranchSha ? [baseSha, previousBranchSha] : [baseSha];
              const sha = await createCommit(
                `chore(release): SDK ${language}/${spec} v${sdkVersion}\n\nSDK based on spec/${spec}/v${specVersion}`,
                tree,
                parents,
                `${language}/${spec} v${sdkVersion}`,
              );
              await deleteRef(`tags/${branch}`);
              await createOrUpdateRef(`heads/${branch}`, sha);
              return { branch, sha };
            }

            await assertTagAbsent(specTag);
            for (const tag of sdkTags) {
              await assertTagAbsent(tag);
            }

            const baseSha = git(["rev-parse", "HEAD"]);
            const baseTree = git(["rev-parse", "HEAD^{tree}"]);
            const specPath = `spec/${spec}/${spec}.re.openapi.yaml`;
            const specTree = await createTreeFromRoots(baseTree, baseSha, [specPath]);
            const releaseSha = await createCommit(
              `chore(release): spec ${spec} v${specVersion}`,
              specTree,
              [baseSha],
              `spec ${spec} v${specVersion}`,
            );

            await createOrUpdateRef(`heads/${targetBranch}`, releaseSha);
            await createTag(specTag, `Release spec ${spec} v${specVersion}`, releaseSha);

            const { data: releaseCommit } = await github.rest.git.getCommit({ owner, repo, commit_sha: releaseSha });
            const sdkBranches = [];
            for (const tag of sdkTags) {
              const language = tag.split("/")[0];
              const sdkVersion = tag.split("/").at(-1).replace(/^v/, "");
              const { branch, sha } = await createSdkBranchCommit(language, releaseSha, releaseCommit.tree.sha, baseSha, sdkVersion);
              await createTag(tag, `Release ${tag} based on spec/${spec}/v${specVersion}`, sha);
              sdkBranches.push(`${branch}=${sha}`);
            }

            core.setOutput("release_sha", releaseSha);
            core.setOutput("sdk_branches", sdkBranches.join(" "));

      # TODO: later add GitHub release tab creation
