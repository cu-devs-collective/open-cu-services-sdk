openapi: 3.0.3
info:
  title: CU LMS API
  description: >
    Reverse engineered OpenAPI specification for the CU LMS API.
  version: 0.1.0
  license:
    name: MIT
    # yamllint disable-line rule:line-length
    url: https://github.com/cu-devs-collective/open-cu-services-openapi/blob/master/LICENSE
servers:
  - url: https://my.centraluniversity.ru/api
    description: Production CU LMS API server.
  - url: "{proto}://{host}:{port}/api"
    description: Custom CU LMS API server.
    variables:
      proto:
        description: Server protocol.
        default: "http"
      host:
        description: Server host.
        default: "127.0.0.1"
      port:
        description: Server port.
        default: "8080"
security:
  - BffCookie: [ ]
tags:
  - name: student
    description: Endpoints for accessing data for authenticated student.
  - name: courses
    description: Endpoints for accessing courses data.
paths:
  /micro-lms/students/me:
    get:
      operationId: currentStudent
      summary: Get current student.
      description: Returns authenticated student data.
      x-re-notes: This endpoint appears not to be used by non-students.
      security:
        - BffCookie: [ ]
      tags: [ student ]
      responses:
        "200":
          description: Successful response with the authenticated student data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentStudentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/student:
    get:
      operationId: listStudentCourses
      summary: List courses for the current student.
      description: >
        Returns courses summary the authenticated student is enrolled in.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/PublicationStateFilterQuery"
      responses:
        "200":
          description: >
            Successful response with a list of courses summary for the
            authenticated student.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStudentCoursesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/{courseId}:
    get:
      operationId: courseSummaryById
      summary: Get course summary by its ID.
      description: Returns summary information about a course by courseId.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/{courseId}/overview:
    get:
      operationId: courseOverviewById
      summary: Get course overview by its ID.
      description: >
        Returns course overview by courseId. Overview consists of unit items
        called as themes, which are typically weekly modules of longread IDs
        and exercise items.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course overview by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseOverviewByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/themes/{themeId}:
    get:
      operationId: courseThemeSummaryById
      summary: Get course theme summary by its ID.
      description: Returns summary information about a course theme by themeId.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/ThemeIdPath"
      responses:
        "200":
          description: Successful response with course theme summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThemeSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/longreads/{longreadId}:
    get:
      operationId: longreadSummaryById
      summary: Get longread summary by its ID.
      description: >
        Returns summary information about a longread item by longreadId.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LongreadIdPath"
      responses:
        "200":
          description: >
            Successful response with longread item summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LongreadSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/longreads/{longreadId}/materials:
    get:
      operationId: longreadMaterialsById
      summary: Get longread materials by its ID.
      description: >
        Returns longread materials by longreadId.
        Materials are blocks like markdown, files and exercises.
        Blocks are declared for each longread.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LongreadIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Successful response with longread materials by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LongreadMaterialsByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  securitySchemes:
    BffCookie:
      type: apiKey
      in: cookie
      name: bff.cookie
      description: >
        Session cookie used to authenticate the user when calling the LMS API.
  parameters:
    LimitQuery:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 25
    OffsetQuery:
      name: offset
      in: query
      description: Number of items to skip before collecting result items.
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    PublicationStateFilterQuery:
      name: state
      in: query
      style: form
      explode: true
      description: >
        Include only courses whose state matches any of the specified values.
      schema:
        type: array
        items:
          $ref: "#/components/schemas/PublicationState"
    CourseIdPath:
      name: courseId
      in: path
      required: true
      description: Numeric identifier of the course specified in URL path.
      schema:
        $ref: "#/components/schemas/CourseId"
      example: 897
    ThemeIdPath:
      name: themeId
      in: path
      required: true
      description: Numeric identifier of the course theme specified in URL path.
      schema:
        $ref: "#/components/schemas/CourseThemeId"
      example: 8653
    LongreadIdPath:
      name: longreadId
      in: path
      required: true
      description: >
        Numeric identifier of the longread item specified in URL path.
      schema:
        $ref: "#/components/schemas/LongreadId"
      example: 12707
  schemas:
    BaseErrorTitle:
      type: string
      description: Short, human-readable summary of the problem type.
      example: "Unauthorized"
    BaseErrorStatus:
      type: integer
      format: int32
      minimum: 100
      maximum: 599
      description: HTTP status code.
      example: 401
    BaseProblemError:
      type: object
      description: Base problem JSON error originating from RFC 9457.
      additionalProperties: true
      required: [ title, status ]
      properties:
        type:  # non-required
          type: string
          x-re-notes: Website in the URL seems to be abandoned.
          example: "https://httpstatuscodes.io/401"
        title:
          $ref: "#/components/schemas/BaseErrorTitle"
        status:
          $ref: "#/components/schemas/BaseErrorStatus"
    BaseErrorTraceId:
      type: string
      pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
      description: >
        W3C Trace Context traceparent value for backend to correlate requests
        across services.
      example: "00-00000000000000000000000000000000-0000000000000000-01"
    BaseBadRequestError:
      type: object
      description: Base error for Bad Request status.
      additionalProperties: false
      required: [ title, status, errors ]
      properties:
        title:
          allOf:
            - $ref: "#/components/schemas/BaseErrorTitle"
          example: "One or more validation errors occurred."
        status:
          allOf:
            - $ref: "#/components/schemas/BaseErrorStatus"
          example: 400
        errors:
          type: object
          description: Field-level validation errors keyed by property name.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            {
              "courseId": [ "The value 'invalid-value-example' is not valid." ]
            }
    BaseUnauthorizedError:
      type: object
      description: Base error for Unauthorized status.
      x-re-notes: >
        Interesting thing is that `type` is sometimes specified,
        e.g. for notification-hub service, while for micro-lms it is not.
      additionalProperties: false
      required: [ title, status, traceId ]
      properties:
        type:  # non-required
          type: string
          x-re-notes: Website in the URL seems to be abandoned.
          example: "https://httpstatuscodes.io/401"
        title:
          allOf:
            - $ref: "#/components/schemas/BaseErrorTitle"
          example: "Unauthorized"
        status:
          allOf:
            - $ref: "#/components/schemas/BaseErrorStatus"
          example: 401
        traceId:
          $ref: "#/components/schemas/BaseErrorTraceId"
    BaseNotFoundError:
      type: object
      description: Base error for Not Found status.
      additionalProperties: false
      required: [ title, status, detail, instance, entityId, traceId ]
      properties:
        title:
          allOf:
            - $ref: "#/components/schemas/BaseErrorTitle"
          example: "NotFound"
        status:
          allOf:
            - $ref: "#/components/schemas/BaseErrorStatus"
          example: 404
        detail:
          type: string
          description: Details of the error.
          example: "Ресурс с идентификатором 1 не найден"
        instance:
          type: string
          description: >
            Relative request path without service prefix where error occurred.
          example: "/courses/1"
        entityId:
          type: integer
          description: ID of the entity that was not found.
          example: 1
        traceId:
          $ref: "#/components/schemas/BaseErrorTraceId"
    _propertyNeedsAnalysis_SeenAsNull:
      type: string
      nullable: true
      description: Special object for values only seen as null.
      enum:
        - null
      x-re-needs-analysis: true
      x-re-needs-analysis-notes:
        This field needs analysis, value seen only as null.
    _propertyNeedsAnalysis_SeenAsEmptyArray:
      type: array
      minItems: 0
      maxItems: 0
      items:
        type: object
        additionalProperties: true
      x-re-needs-analysis: true
      x-re-needs-analysis-notes:
        This field needs analysis, value seen only as empty array.
    PublicationState:
      type: string
      description: Publication state of an item.
      x-re-notes: >
        Known values:
          - "published" - filters non-archived non-draft items
          - "archived" - filters archived items
          - "draft" - filters draft items (those are items which were
        not published yet, this option is almost useless as such items are
        hidden for regular students)
      enum:
        - published
        - archived
        - draft
      example: "published"
    CourseId:
      type: integer
      minimum: 0
      description: Numeric identifier of the course.
      example: 897
    SkillLevel:
      type: string
      description: Skill level label configured for the course.
      x-re-notes: >
        Unknown usage, as the only seen value is "none".
        This field appears to be inactive/unused for now.
      enum:
        - none
      example: "none"
    CourseSettings:
      type: object
      description: Prerequisites for enrolling in the course.
      x-re-notes: >
        Seems to be incorrect right now, in the future this can change.
      additionalProperties: false
      required: [ skillLevel, isSkillLevelEnabled ]
      properties:
        skillLevel:
          $ref: "#/components/schemas/SkillLevel"
        isSkillLevelEnabled:
          type: boolean
          description: Indicates if skill level is enabled for the course.
          x-re-notes: >
            Observed `skillLevel` only with value "none", so this
            flag currently appears to have no effect.
            This field is sometimes set to true, sometimes to false across
            courses without any relation.
          example: false
    CourseName:
      type: string
      description: Course name.
      example: "Английский язык 204S4"
    CourseIsArchived:
      type: boolean
      description: Indicates if the course is archived.
      x-re-notes: >
        Typically set at the end of a semester to mark the course as finished.
      example: false
    PublishDate:
      type: string
      format: date-time
      nullable: true
      description: Scheduled item publication timestamp, if set.
      x-re-notes: >
        Can be unset, also can be earlier or later than `publishedAt` value.
      example: "2026-01-26T07:00:00+00:00"
    PublishedAt:
      type: string
      format: date-time
      nullable: true
      description: Actual item publication timestamp.
      x-re-notes: >
        It looks like this field is null for items with `state` "draft".
      example: "2026-01-26T07:00:44.919045+00:00"
    CourseCategory:
      type: string
      description: Category to which the course belongs to.
      x-re-needs-analysis: true
      x-re-needs-analysis-notes: >
        Those are clearly not all of the values that exist, so other values
        should be added as they are found.
      x-re-notes: >
        Known values:
          - "withoutCategory" - not categorized stuff
          - "general" - general courses, e.g. English
          - "career" - career stuff, e.g. Mock Interview intensive
          - "stem" - STEM courses
          - "softSkills" - soft skills category courses
          - "mathematics" - math courses
          - "development" - courses for devs
      enum:
        - withoutCategory
        - general
        - career
        - stem
        - softSkills
        - mathematics
        - development
      example: "general"
    CourseCategoryCover:
      type: string
      description: Course card icon style identifier.
      x-re-notes: >
        Those may be not all of the values that exist, so it is good to add
        new values here if this is being used for some reason by someone.
        It seems there is some algorithm on frontend which decides
        which color to use for the course card.
      enum:
        - spiralLoops
        - sineWave
        - curvesGrid
        - geometricTriangle
        - verticalLines
        - symmetricCircles
        - ellipsesOverlap
      example: "symmetricCircles"
    CourseSummaryItem:
      type: object
      description: Summary information about a course, used for course listing.
      additionalProperties: false
      required: [ id, name, state, publishDate, publishedAt, settings,
                  subjectId, isArchived, category, categoryCover ]
      properties:
        id:
          $ref: "#/components/schemas/CourseId"
        name:
          $ref: "#/components/schemas/CourseName"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        settings:
          $ref: "#/components/schemas/CourseSettings"
        subjectId:
          type: integer
          nullable: true
          description: Identifier of the subject this course belongs to.
          x-re-notes: >
            Courses covering the same subject typically share the same
            `subjectId`, e.g. courses with names
            "Архитектура компьютера и операционные системы I"
            and "Архитектура компьютера и операционные системы 2"
            have the same value.
            This field is not guaranteed to be set: e.g. courses with names
            "English 104" and "English 104. Semester 2" have `subjectId` unset.
          example: 32
        isArchived:
          $ref: "#/components/schemas/CourseIsArchived"
        category:
          $ref: "#/components/schemas/CourseCategory"
        categoryCover:
          $ref: "#/components/schemas/CourseCategoryCover"
    Paging:
      type: object
      additionalProperties: false
      required: [ limit, offset, totalCount ]
      properties:
        limit:
          type: integer
          format: int32
          minimum: 1
          example: 25
        offset:
          type: integer
          format: int32
          minimum: 0
          example: 0
        totalCount:
          type: integer
          format: int32
          minimum: 0
          example: 1
    ListStudentCoursesResponse:
      type: object
      additionalProperties: false
      required: [ items, paging ]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseSummaryItem"
        paging:
          $ref: "#/components/schemas/Paging"
    UserId:
      type: string
      format: uuid
      description: Unique identifier of the user.
      x-re-notes: >
        This UUID is the primary identifier used to reference the user
        on backend DB.
        "00000000-0000-0000-0000-000000000000" is reserved for the System user.
      example: "00000000-0000-0000-0000-000000000000"
    UniversityEmail:
      type: string
      format: email
      x-re-notes: >
        Most emails use the edu.centraluniversity.ru domain, but other
        domains may occur (e.g., gmail.com) in rare cases.
      example: "i.ivanov@edu.centraluniversity.ru"
    TimeAccount:
      type: string
      minLength: 3
      maxLength: 22
      pattern: "^[a-z][a-z0-9._-]{2,21}$"
      description: Username in TiMe messenger (T-Bank's fork of Mattermost).
      externalDocs:
        # yamllint disable-line rule:line-length
        url: https://docs.mattermost.com/end-user-guide/preferences/manage-your-profile.html#:~:text=message%2E-,Username
        description: Username constraints from Official Mattermost docs.
      example: "i.ivanov"
    StudyLevel:
      type: string
      description: Student’s current education level.
      x-re-notes: >
        "none" level is given to non-enrolled users.
        Other values may appear in the future.
      enum:
        - none
        - bachelor
        - master
        - dpo
        - dpoMaster
    CurrentStudentResponse:
      type: object
      additionalProperties: false
      required: [ id, lastName, firstName, middleName, universityEmail,
                  timeAccount, studyStartYear, studyLevel, lateDaysBalance ]
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        lastName:
          type: string
          example: "Иванов"
        firstName:
          type: string
          example: "Иван"
        middleName:
          type: string
          nullable: true
          x-re-notes: This value is nullable.
          example: "Иванович"
        universityEmail:
          nullable: false
          x-re-notes: This field appears to be non-nullable.
          allOf:
            - $ref: "#/components/schemas/UniversityEmail"
        timeAccount:
          nullable: false
          x-re-notes: This field appears to be non-nullable.
          allOf:
            - $ref: "#/components/schemas/TimeAccount"
        studyStartYear:
          type: integer
          minimum: 1970
          nullable: true
          description: Year the student enrolled at the university.
          x-re-notes: >
            It seems that null indicates the student was not enrolled.
          example: 2024
        studyLevel:
          $ref: "#/components/schemas/StudyLevel"
        lateDaysBalance:
          type: integer
          minimum: 0
          description: Number of late days remaining for the student.
          example: 50
    CourseSummaryByIdResponse:
      $ref: "#/components/schemas/CourseSummaryItem"
    CourseThemeId:
      type: integer
      minimum: 0
      description: Numeric identifier of the course theme.
      example: 6663
    LongreadId:
      type: integer
      minimum: 0
      description: Numeric identifier of the longread item.
      example: 12707
    LongreadType:
      type: string
      description: Longread item type.
      x-re-notes: >
        Needs further analysis, as the only seen value is "common".
        This field appears to be inactive/unused for now.
      enum:
        - common
      example: "common"
    ExerciseId:
      type: integer
      minimum: 0
      description: Numeric identifier of the exercise item.
      example: 48139
    ActivityId:
      type: integer
      minimum: 0
      description: Numeric identifier of the activity item.
      example: 2161
    ActivityName:
      type: string
      description: Activity name.
      example: "Аудиторная работа на семинарах"
    ActivityDefinition:
      type: object
      additionalProperties: false
      description: >
        Activity definition shared across exercises. Multiple exercises
        reference the same activity definition.
      required: [ id, name, weight ]
      properties:
        id:
          $ref: "#/components/schemas/ActivityId"
        name:
          $ref: "#/components/schemas/ActivityName"
        weight:
          type: number
          format: float
          description: >
            Weight coefficient for every single activity by activity name,
            used in the course grade formula to calculate the overall semester
            score.
          minimum: 0
          maximum: 1
          example: 0.25
    Deadline:
      type: string
      format: date-time
      nullable: false
      description: Deadline by which the item must be completed.
      x-re-notes: This field appears to be non-nullable.
      example: "2026-02-15T19:00:00+00:00"
    MaxScore:
      type: integer
      minimum: 0
      description: Maximum possible score for completing exercise.
      example: 10
    ExerciseName:
      type: string
      description: Exercise name shown as the header is LMS.
      example: "Seminar 1. Week 2"
    ExerciseItem:
      type: object
      additionalProperties: false
      description: An exercise item within a longread item.
      required: [ id, name, maxScore, activity, deadline ]
      properties:
        id:
          $ref: "#/components/schemas/ExerciseId"
        name:
          $ref: "#/components/schemas/ExerciseName"
        maxScore:
          $ref: "#/components/schemas/MaxScore"
        activity:
          $ref: "#/components/schemas/ActivityDefinition"
        deadline:
          $ref: "#/components/schemas/Deadline"
    LongreadName:
      type: string
      description: Longread name shown as the header in LMS.
      x-re-notes: >
        Better example values are e.g. "Lesson 1A: Duolingo" or "Homework".
      example: "Ссылка на силлабус"
    LongreadItem:
      type: object
      additionalProperties: false
      description: >
        A longread list item within a course theme. It may be self-contained
        content or include one or more associated exercises.
      required: [ id, type, name, state, publishDate, publishedAt, exercises ]
      properties:
        id:
          $ref: "#/components/schemas/LongreadId"
        type:
          $ref: "#/components/schemas/LongreadType"
        name:
          $ref: "#/components/schemas/LongreadName"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        exercises:
          type: array
          minItems: 0
          description: Exercises associated with this longread.
          items:
            $ref: "#/components/schemas/ExerciseItem"
    CourseThemeName:
      type: string
      description: >
        Course theme name shown on the course view in LMS.
      example: "Силлабус"
    ListingOrder:
      type: integer
      minimum: 0
      description: >
        Listing order determining the item's line position in the LMS,
        lower values come first.
      x-re-notes: >
        Seen minimum value as 1 e.g. for course theme and longread item,
        but 0 for longread material.
      example: 1
    CourseThemeItem:
      type: object
      additionalProperties: false
      description: >
        Course theme is a unit, which is typically a weekly module of
        longread IDs and exercise items.
      required: [ id, name, order, state, publishDate, publishedAt, longreads ]
      properties:
        id:
          $ref: "#/components/schemas/CourseThemeId"
        name:
          $ref: "#/components/schemas/CourseThemeName"
        order:
          $ref: "#/components/schemas/ListingOrder"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        longreads:
          type: array
          items:
            $ref: "#/components/schemas/LongreadItem"
    CourseOverviewByIdResponse:
      type: object
      additionalProperties: false
      required: [ id, name, isArchived, state, publishDate, publishedAt,
                  settings, themes ]
      properties:
        id:
          $ref: "#/components/schemas/CourseId"
        name:
