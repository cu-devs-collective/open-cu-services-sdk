openapi: 3.0.3
info:
  title: CU LMS API
  description: >
    Reverse engineered OpenAPI specification for the CU LMS API.
  version: 0.1.0
  license:
    name: MIT
    url: https://github.com/CU-Club/cu-open-lms-openapi/blob/master/LICENSE
servers:
  - url: https://my.centraluniversity.ru/api
    description: Production CU LMS API server.
  - url: "{proto}://{host}:{port}/api"
    description: Custom CU LMS API server.
    variables:
      proto:
        description: Server protocol.
        default: "http"
      host:
        description: Server host.
        default: "127.0.0.1"
      port:
        description: Server port.
        default: "8080"
security:
  - BffCookie: [ ]
tags:
  - name: student
    description: Endpoints for accessing data for authenticated student.
  - name: courses
    description: Endpoints for accessing courses data.
paths:
  /micro-lms/students/me:
    get:
      operationId: currentStudent
      summary: Get current student.
      description: Returns authenticated student data.
      x-re-notes: This endpoint appears not to be used by non-students.
      security:
        - BffCookie: [ ]
      tags: [ student ]
      responses:
        "200":
          description: Successful response with the authenticated student data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentStudentResponse"
  /micro-lms/courses/student:
    get:
      operationId: listStudentCourses
      summary: List courses for the current student.
      description: >
        Returns courses summary the authenticated student is enrolled in.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - in: query
          name: limit
          description: Maximum number of items to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 25
        - in: query
          name: offset
          description: Number of items to skip before collecting result items.
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - in: query
          name: state
          style: form
          explode: true
          description: >
            Include only courses whose state matches any of the specified
            values.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/PublicationState"
      responses:
        "200":
          description: >
            Successful response with a list of courses summary for the
            authenticated student.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStudentCoursesResponse"
  /micro-lms/courses/{courseId}:
    get:
      operationId: courseSummary
      summary: Get course summary by its ID.
      description: Returns summary information about a course by courseId.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseSummaryResponse"
  /micro-lms/courses/{courseId}/overview:
    get:
      operationId: courseOverview
      summary: Get course overview by its ID.
      description: >
        Returns course overview by courseId. Overview consists of unit items
        called as themes, which are typically weekly modules of longreads and
        exercises.
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course overview by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseOverviewResponse"
components:
  securitySchemes:
    BffCookie:
      type: apiKey
      in: cookie
      name: bff.cookie
      description: >
        Session cookie used to authenticate the user when calling the LMS API.
  parameters:
    CourseIdPath:
      name: courseId
      in: path
      required: true
      description: Numeric identifier of the course specified in URL path.
      schema:
        $ref: "#/components/schemas/CourseId"
      example: 897
  schemas:
    PublicationState:
      type: string
      description: Publication state of an item.
      x-re-notes: >
        Known values are the following:
        - publushed - filters non-archived non-draft items
        - archived - filters archived items
        - draft - filters draft items (those are items which were
        not published yet, this option is almost useless as such items are
        hidden for regular students)
      enum:
        - published
        - archived
        - draft
      example: "published"
    CourseId:
      type: integer
      minimum: 0
      description: Numeric identifier of the course.
      example: 897
    SkillLevel:
      type: string
      description: Skill level label configured for the course.
      x-re-notes: >
        Unknown usage, as the only seen value is "none".
        This field appears to be inactive/unused for now.
      enum:
        - none
      example: "none"
    CourseSettings:
      type: object
      description: Prerequisites for enrolling in the course.
      x-re-notes: >
        Seems to be incorrect right now, in the future this can change.
      additionalProperties: false
      required: [ skillLevel, isSkillLevelEnabled ]
      properties:
        skillLevel:
          $ref: "#/components/schemas/SkillLevel"
        isSkillLevelEnabled:
          type: boolean
          description: Indicates if skill level is enabled for the course.
          x-re-notes: >
            Observed skillLevel field only with value "none", so this
            flag currently appears to have no effect.
            This field is sometimes set to true, sometimes to false across
            courses without any relation.
          example: false
    CourseName:
      type: string
      description: Course name.
      example: "Английский язык 204S4"
    CourseIsArchived:
      type: boolean
      description: Indicates if the course is archived.
      x-re-notes:
        Typically set at the end of a semester to mark the course as finished.
      example: false
    PublishDate:
      type: string
      format: date-time
      nullable: true
      description: Scheduled item publication timestamp, if set.
      x-re-notes:
        Can be unset, also can be earlier or later than publishedAt
        field value.
      example: "2026-01-26T07:00:00+00:00"
    PublishedAt:
      type: string
      format: date-time
      nullable: true
      description: Actual item publication timestamp.
      x-re-notes: >
        It looks like this field is null for items with state "draft".
      example: "2026-01-26T07:00:44.919045+00:00"
    CourseCategory:
      type: string
      description: Category to which the course belongs to.
      x-re-needs-analysis: true
      x-re-needs-analysis-notes: >
        Those are clearly not all of the values that exist, so other values
        should be added as they are found.
      x-re-notes: >
        Known values are the following:
        - withoutCategory - not categorized stuff
        - general - general courses, f.e. English
        - career - career stuff, f.e. Mock Interview intensive
        - stem - STEM courses
        - softSkills - soft skills category courses
        - mathematics - math courses
        - development - courses for devs
      anyOf:
        - type: string
          enum:
            - withoutCategory
            - general
            - career
            - stem
            - softSkills
            - mathematics
            - development
        - type: string
      example: "general"
    CourseCategoryCover:
      type: string
      description: Course card icon style identifier.
      x-re-notes: >
        Those may be not all of the values that exist, so any string
        is accepted.
        It seems there is some algorithm on frontend which decides
        which color to use for the course card.
      anyOf:
        - type: string
          enum:
            - spiralLoops
            - sineWave
            - curvesGrid
            - geometricTriangle
            - verticalLines
            - symmetricCircles
            - ellipsesOverlap
        - type: string
      example: "symmetricCircles"
    CourseSummaryItem:
      type: object
      description: Summary information about a course, used for course listing.
      additionalProperties: false
      required: [ id, name, state, publishDate, publishedAt, settings,
                  subjectId, isArchived, category, categoryCover ]
      properties:
        id:
          $ref: "#/components/schemas/CourseId"
        name:
          $ref: "#/components/schemas/CourseName"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        settings:
          $ref: "#/components/schemas/CourseSettings"
        subjectId:
          type: integer
          nullable: true
          description: Identifier of the subject this course belongs to.
          x-re-notes: >
            Courses covering the same subject typically share the same
            subjectId, f.e. courses with names
            "Архитектура компьютера и операционные системы I"
            and "Архитектура компьютера и операционные системы 2"
            have the same value.
            This field is not guaranteed to be set: f.e. courses with names
            "English 104" and "English 104. Semester 2" have subjectId unset.
          example: 32
        isArchived:
          $ref: "#/components/schemas/CourseIsArchived"
        category:
          $ref: "#/components/schemas/CourseCategory"
        categoryCover:
          $ref: "#/components/schemas/CourseCategoryCover"
    Paging:
      type: object
      additionalProperties: false
      required: [ limit, offset, totalCount ]
      properties:
        limit:
          type: integer
          format: int32
          minimum: 1
          example: 25
        offset:
          type: integer
          format: int32
          minimum: 0
          example: 0
        totalCount:
          type: integer
          format: int32
          minimum: 0
          example: 1
    ListStudentCoursesResponse:
      type: object
      additionalProperties: false
      required: [ items, paging ]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseSummaryItem"
        paging:
          $ref: "#/components/schemas/Paging"
    UserId:
      type: string
      format: uuid
      description: Unique identifier of the user.
      x-re-notes: >
        This UUID is the primary identifier used to reference the user
        on backend DB.
      example: "00000000-0000-0000-0000-000000000000"
    UniversityEmail:
      type: string
      format: email
      x-re-notes: >
        Most emails use the edu.centraluniversity.ru domain, but other
        domains may occur (e.g., gmail.com) in rare cases.
      example: "i.ivanov@edu.centraluniversity.ru"
    TimeAccount:
      type: string
      minLength: 3
      maxLength: 22
      pattern: "^[a-z][a-z0-9._-]{2,21}$"
      description: Username in TiMe messenger (T-Bank's fork of Mattermost).
      externalDocs:
        # yamllint disable-line rule:line-length
        url: https://docs.mattermost.com/end-user-guide/preferences/manage-your-profile.html#:~:text=message%2E-,Username
        description: Username constraints from Official Mattermost docs.
      example: "i.ivanov"
    StudyLevel:
      type: string
      description: Student’s current education level.
      x-re-notes: >
        "none" level is given to non-enrolled users.
        Other values may appear in the future.
      enum:
        - none
        - bachelor
        - master
        - dpo
        - dpoMaster
    CurrentStudentResponse:
      type: object
      additionalProperties: false
      required: [ id, lastName, firstName, middleName, universityEmail,
                  timeAccount, studyStartYear, studyLevel, lateDaysBalance ]
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        lastName:
          type: string
          example: "Иванов"
        firstName:
          type: string
          example: "Иван"
        middleName:
          type: string
          nullable: true
          x-re-notes: This value is nullable.
          example: "Иванович"
        universityEmail:
          allOf:
            - $ref: "#/components/schemas/UniversityEmail"
            - type: string
              nullable: false
              x-re-notes: This field appears to be required (non-nullable).
        timeAccount:
          allOf:
            - $ref: "#/components/schemas/TimeAccount"
            - type: string
              nullable: false
              x-re-notes: This field appears to be required (non-nullable).
        studyStartYear:
          type: integer
          minimum: 1970
          nullable: true
          description: Year the student enrolled at the university.
          x-re-notes: >
            It seems that null indicates the student was not enrolled.
          example: 2024
        studyLevel:
          $ref: "#/components/schemas/StudyLevel"
        lateDaysBalance:
          type: integer
          minimum: 0
          description: Number of late days remaining for the student.
          example: 50
    CourseSummaryResponse:
      $ref: "#/components/schemas/CourseSummaryItem"
    CourseThemeId:
      type: integer
      minimum: 0
      description: Numeric identifier of the course theme.
      example: 6663
    CourseThemeName:
      type: string
      description: "#TODO: CourseThemeName description."
      example: "Силлабус"
    LongreadItem:  # TODO: LongreadItem
      type: object
      additionalProperties: false
      description: "#TODO: LongreadItem description."
    CourseThemeItem:
      type: object
      additionalProperties: false
      description: "#TODO: CourseThemeItem description."
      required: [ id, name, order, state, publishDate, publishedAt, longreads ]
      properties:
        id:
          $ref: "#/components/schemas/CourseThemeId"
        name:
          $ref: "#/components/schemas/CourseThemeName"
        order:
          type: integer
          minimum: 1
          description: "#TODO: order description."
          example: 1
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        longreads:
          $ref: "#/components/schemas/LongreadItem"
    CourseOverviewResponse:
      type: object
      additionalProperties: false
      required: [ id, name, isArchived, state, publishDate, publishedAt,
                  settings, themes ]
      properties:
        id:
          $ref: "#/components/schemas/CourseId"
        name:
          $ref: "#/components/schemas/CourseName"
        isArchived:
          $ref: "#/components/schemas/CourseIsArchived"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        settings:
          $ref: "#/components/schemas/CourseSettings"
        themes:
          type: array
          items:
            $ref: "#/components/schemas/CourseThemeItem"
