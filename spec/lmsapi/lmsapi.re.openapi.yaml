openapi: 3.0.3
info:
  title: CU LMS API
  description: >
    Reverse engineered OpenAPI specification for the CU LMS API.
  version: 0.0.0
  license:
    name: MIT
    # yamllint disable-line rule:line-length
    url: https://github.com/cu-devs-collective/open-cu-services-openapi/blob/master/LICENSE
servers:
  - url: https://my.centraluniversity.ru/api
    description: Production CU LMS API server.
  - url: "{proto}://{host}:{port}/api"
    description: Custom CU LMS API server.
    variables:
      proto:
        description: Server protocol.
        default: "http"
      host:
        description: Server host.
        default: "127.0.0.1"
      port:
        description: Server port.
        default: "8080"
security:
  - BffCookie: [ ]
tags:
  - name: student
    description: Endpoints for accessing data for authenticated student.
  - name: courses
    description: Endpoints for accessing courses data.
  - name: tasks
    description: Endpoints for accessing tasks data.
paths:
  /micro-lms/students/me:
    get:
      operationId: currentStudent
      summary: Get current student.
      description: Returns authenticated student data.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ personalData, accountData ]
        operation:
          stability: stable
          categories: [ read ]
          notes: This operation appears to be used only by student accounts.
      security:
        - BffCookie: [ ]
      tags: [ student ]
      responses:
        "200":
          description: Successful response with the authenticated student data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentStudentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/student:
    get:
      operationId: listStudentCourses
      summary: List courses for the current student.
      description: >
        Returns courses summary the authenticated student is enrolled in.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ accountData, internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/PublicationStateFilterQuery"
      responses:
        "200":
          description: >
            Successful response with a list of courses summary for the
            authenticated student.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStudentCoursesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/{courseId}:
    get:
      operationId: courseSummaryById
      summary: Get course summary by its ID.
      description: Returns summary information about a course by courseId.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/courses/{courseId}/overview:
    get:
      operationId: courseOverviewById
      summary: Get course overview by its ID.
      description: >
        Returns course overview by courseId. Overview consists of unit items
        called as themes, which are typically weekly modules of longread IDs
        and exercise items.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/CourseIdPath"
      responses:
        "200":
          description: Successful response with course overview by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseOverviewByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/themes/{themeId}:
    get:
      operationId: courseThemeSummaryById
      summary: Get course theme summary by its ID.
      description: Returns summary information about a course theme by themeId.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/ThemeIdPath"
      responses:
        "200":
          description: Successful response with course theme summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseThemeSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/longreads/{longreadId}:
    get:
      operationId: longreadSummaryById
      summary: Get longread summary by its ID.
      description: >
        Returns summary information about a longread item by longreadId.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LongreadIdPath"
      responses:
        "200":
          description: >
            Successful response with longread item summary by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LongreadSummaryByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/longreads/{longreadId}/materials:
    get:
      operationId: longreadMaterialsById
      summary: Get longread materials by its ID.
      description: >
        Returns longread materials by longreadId.
        Materials are blocks like markdown, files and exercises.
        Blocks are declared for each longread.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ accountData, internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses ]
      parameters:
        - $ref: "#/components/parameters/LongreadIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Successful response with longread materials by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LongreadMaterialsByIdResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/tasks/{taskId}:
    get:
      operationId: taskById
      summary: Get task by its ID.
      description: Returns task by taskId.
      x-re:
        safety:
          replayability: safe
          dataKinds: [ accountData, internalData ]
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ courses, tasks ]
      parameters:
        - $ref: "#/components/parameters/TaskIdPath"
      responses:
        "200":
          description: Successful response with task by its ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskByIdResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
  /micro-lms/tasks/{taskId}/start:
    put:
      operationId: startTaskById
      summary: Start task by its ID.
      description: Starts task by its ID, changing task's status.
      x-re:
        safety:
          replayability: caution
          dataKinds: [ ]
          notes: Starts task without a way of going back.
        operation:
          categories: [ read ]
      security:
        - BffCookie: [ ]
      tags: [ tasks ]
      parameters:
        - $ref: "#/components/parameters/TaskIdPath"
      responses:
        "200":
          description: Successfully changed task status, started task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTaskByIdResponse"
        "400":
          description: >
            HTTP 400 - Bad Request error.
            Returned when request validation was failed because it is invalid.
          content:
            application/problem+json:
              schema:
                type: object
                additionalProperties: false
                required: [ title, status, detail, instance, entity, state,
                            trigger, traceId ]
                properties:
                  title:
                    allOf:
                      - $ref: "#/components/schemas/BaseErrorTitle"
                    example: "InvalidState"
                  status:
                    allOf:
                      - $ref: "#/components/schemas/BaseErrorStatus"
                    example: 400
                  detail:
                    type: string
                    # yamllint disable-line rule:line-length
                    example: "Для сущности задача невозможно выполнить Start в состоянии InProgress"
                  instance:
                    type: string
                    example: "/tasks/1535171/start"
                  entity:
                    type: string
                    example: "задача"
                  state:
                    type: string
                    example: "InProgress"
                  trigger:
                    type: string
                    example: "Start"
                  traceId:
                    $ref: "#/components/schemas/BaseErrorTraceId"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  securitySchemes:
    BffCookie:
      type: apiKey
      in: cookie
      name: bff.cookie
      description: >
        Session cookie used to authenticate the user when calling the LMS API.
  parameters:
    LimitQuery:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 25
    OffsetQuery:
      name: offset
      in: query
      description: Number of items to skip before collecting result items.
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    PublicationStateFilterQuery:
      name: state
      in: query
      style: form
      explode: true
      description: >
        Include only courses whose state matches any of the specified values.
      schema:
        type: array
        items:
          $ref: "#/components/schemas/PublicationState"
    CourseIdPath:
      name: courseId
      in: path
      required: true
      description: Numeric identifier of the course specified in URL path.
      schema:
        $ref: "#/components/schemas/CourseId"
      example: 897
    ThemeIdPath:
      name: themeId
      in: path
      required: true
      description: Numeric identifier of the course theme specified in URL path.
      schema:
        $ref: "#/components/schemas/CourseThemeId"
      example: 8653
    LongreadIdPath:
      name: longreadId
      in: path
      required: true
      description: >
        Numeric identifier of the longread item specified in URL path.
      schema:
        $ref: "#/components/schemas/LongreadId"
      example: 12707
    TaskIdPath:
      name: taskId
      in: path
      required: true
      description: Numeric identifier of the task item specified in URL path.
      schema:
        $ref: "#/components/schemas/TaskId"
      example: 1355301
  schemas:
    BaseErrorType:
      type: string
      x-re:
        lifecycle:
          state: inactive
          notes: Website in the URL seems to be abandoned.
      example: "https://httpstatuscodes.io/401"
    BaseErrorTitle:
      type: string
      description: Short, human-readable summary of the problem type.
      example: "Unauthorized"
    BaseErrorStatus:
      type: integer
      format: int32
      minimum: 100
      maximum: 599
      description: HTTP status code.
      example: 401
    BaseProblemError:
      type: object
      description: Base problem JSON error based from RFC 9457 with trace ID.
      additionalProperties: true
      required: [ title, status ]
      properties:
        type:  # non-required
          $ref: "#/components/schemas/BaseErrorType"
        title:
          $ref: "#/components/schemas/BaseErrorTitle"
        status:
          $ref: "#/components/schemas/BaseErrorStatus"
        traceId:  # non-required
          $ref: "#/components/schemas/BaseErrorTraceId"
    BaseErrorTraceId:
      type: string
      pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
      description: >
        W3C Trace Context traceparent value for backend to correlate requests
        across services.
      example: "00-00000000000000000000000000000000-0000000000000000-01"
    BaseBadRequestError:
      type: object
      description: Base error for Bad Request status.
      additionalProperties: false
      required: [ title, status, errors ]
      properties:
        title:
          allOf:
            - $ref: "#/components/schemas/BaseErrorTitle"
          example: "One or more validation errors occurred."
        status:
          allOf:
            - $ref: "#/components/schemas/BaseErrorStatus"
          example: 400
        errors:
          type: object
          description: Field-level validation errors keyed by property name.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            {
              "courseId": [ "The value 'invalid-value-example' is not valid." ]
            }
    BaseUnauthorizedError:
      type: object
      description: Base error for Unauthorized status.
      x-re:
        observation:
          notes: >
            `type` property is sometimes specified, e.g. for
            notification-hub service, while for micro-lms it is not.
        notes: Based on BaseProblemError.
      additionalProperties: false
      required: [ title, status, traceId ]
      properties:
        # Inherited from BaseProblemError.
        type:  # non-required
          $ref: "#/components/schemas/BaseErrorType"
        title:
          $ref: "#/components/schemas/BaseErrorTitle"
        status:
          $ref: "#/components/schemas/BaseErrorStatus"
        # Other.
        traceId:
          $ref: "#/components/schemas/BaseErrorTraceId"
      example:
        {
          "type": "https://httpstatuscodes.io/401",
          "title": "Unauthorized",
          "status": 401,
          "traceId": "00-00000000000000000000000000000000-0000000000000000-01"
        }
    BaseNotFoundError:
      type: object
      description: Base error for Not Found status.
      additionalProperties: false
      required: [ title, status, traceId ]
      properties:
        title:
          allOf:
            - $ref: "#/components/schemas/BaseErrorTitle"
          example: "NotFound"
        status:
          allOf:
            - $ref: "#/components/schemas/BaseErrorStatus"
          example: 404
        detail:  # non-required
          type: string
          description: Details of the error.
          example: "Ресурс с идентификатором 1 не найден"
        instance:  # non-required
          type: string
          description: >
            Relative request path without service prefix where error occurred.
          example: "/courses/1"
        entityId:  # non-required
          type: integer
          description: ID of the entity that was not found.
          example: 1
        traceId:
          $ref: "#/components/schemas/BaseErrorTraceId"
    _x_re_propertyIncomplete_OnlyNullObserved:
      type: string
      nullable: true
      description: Value only seen as null.
      x-re:
        status:
          completeness: partial
        analysis:
          needsAnalysis: true
          priority: medium
          reasons:
            - only-null-observed
      enum:
        - null
    _x_re_propertyIncomplete_OnlyEmptyArrayObserved:
      type: array
      minItems: 0
      maxItems: 0
      description: Value only seen as empty array.
      x-re:
        status:
          completeness: partial
        analysis:
          needsAnalysis: true
          priority: medium
          reasons:
            - only-empty-array-observed
      items:
        type: object
        additionalProperties: true
    PublicationState:
      type: string
      description: Publication state of an item.
      x-re:
        status:
          completeness: full
          confidence: high
          notes: Frontend defines only those values.
        enum:
          descriptions:
            "published": Filters non-archived non-draft items.
            "archived": Filters archived items.
            "draft": >
              Filters draft items (those are items which were
              not published yet, this option is almost useless as such items
              are hidden for regular students).
      enum:
        - published
        - archived
        - draft
      example: "published"
    CourseId:
      type: integer
      minimum: 0
      description: Numeric identifier of the course.
      example: 897
    CourseSkillLevel:
      type: string
      description: Skill level label configured for the course.
      x-re:
        analysis:
          needsAnalysis: true
          priority: low
          reasons:
            - usage-unknown
          notes: This field appears to be inactive/unused for now.
      enum:
        - none
      example: "none"
    CourseIsSkillLevelEnabled:
      type: boolean
      description: Indicates if skill level is enabled for the course.
      x-re:
        analysis:
          needsAnalysis: true
          priority: low
          reasons:
            - usage-unknown
          notes: >
            Observed only value "none" for `skillLevel` property, so this
            flag currently appears to have no effect.
            This field is sometimes set to true, sometimes to false across
            courses without any relation.
      example: false
    CourseSettings:
      type: object
      description: Prerequisites for enrolling in the course.
      x-re:
        analysis:
          needsAnalysis: true
          priority: low
          reasons:
            - usage-unknown
          notes: >
            Values seem to be incorrect for now (they mismatch with their
            expected bahavior), in the future this can change.
      additionalProperties: false
      required: [ skillLevel, isSkillLevelEnabled ]
      properties:
        skillLevel:
          $ref: "#/components/schemas/CourseSkillLevel"
        isSkillLevelEnabled:
          $ref: "#/components/schemas/CourseIsSkillLevelEnabled"
    CourseName:
      type: string
      description: Course name.
      example: "Английский язык 204S4"
    CourseIsArchived:
      type: boolean
      description: Indicates if the course is archived.
      x-re:
        observation:
          notes: >
            Typically set at the end of a semester to mark
            the course as finished.
      example: false
    PublishDate:
      type: string
      format: date-time
      nullable: true
      description: Scheduled item publication timestamp, if set.
      x-re:
        observation:
          notes: >
            Can be unset, also can be earlier or later than `publishedAt` value.
      example: "2026-01-26T07:00:00+00:00"
    PublishedAt:
      type: string
      format: date-time
      nullable: true
      description: Actual item publication timestamp.
      x-re:
        observation:
          notes: >
            It looks like this field is null for items with `state` "draft".
      example: "2026-01-26T07:00:44.919045+00:00"
    CourseCategory:
      type: string
      description: Category to which the course belongs to.
      x-re:
        status:
          completeness: partial
        analysis:
          needsAnalysis: true
          priority: critical
          reasons:
            - enum-incomplete
          notes: >
            Those are clearly not all of the values that exist, so other values
            should be added as they are found.
        enum:
          descriptions:
            "withoutCategory": Not categorized stuff.
            "general": General courses, e.g. English.
            "career": Career stuff, e.g. Mock Interview intensive.
            "stem": STEM courses.
            "softSkills": Soft skills category courses.
            "mathematics": Math courses.
            "development": Courses for devs.
      enum:
        - withoutCategory
        - general
        - career
        - stem
        - softSkills
        - mathematics
        - development
      example: "general"
    CourseCategoryCover:
      type: string
      description: Course card icon style identifier.
      x-re:
        status:
          completeness: partial
        analysis:
          needsAnalysis: true
          priority: low
          reasons:
            - enum-incomplete
          notes: >
            Those may be not all of the values that exist, so it is good to add
            new values here if this is being used for some reason by someone.
            It seems there is some algorithm on frontend which decides
            which color to use for the course card.
        enum:
          descriptions: {}
      enum:
        - spiralLoops
        - sineWave
        - curvesGrid
        - geometricTriangle
        - verticalLines
        - symmetricCircles
        - ellipsesOverlap
      example: "symmetricCircles"
    SubjectId:
      type: integer
      nullable: true
      description: Identifier of the subject this course belongs to.
      x-re:
        observation:
          notes: >
            Courses covering the same subject typically share the same
            `subjectId`, e.g. courses with names
            "Архитектура компьютера и операционные системы I"
            and "Архитектура компьютера и операционные системы 2"
            have the same value.
            This field is not guaranteed to be set: e.g. courses with names
            "English 104" and "English 104. Semester 2" have `subjectId` unset.
      example: 32
    CourseSummaryItem:
      type: object
      description: Summary information about a course, used for course listing.
      additionalProperties: false
      required: [ id, name, state, publishDate, publishedAt, settings,
                  subjectId, isArchived, category, categoryCover ]
      properties:
        id:
          $ref: "#/components/schemas/CourseId"
        name:
          $ref: "#/components/schemas/CourseName"
        state:
          $ref: "#/components/schemas/PublicationState"
        publishDate:
          $ref: "#/components/schemas/PublishDate"
        publishedAt:
          $ref: "#/components/schemas/PublishedAt"
        settings:
          $ref: "#/components/schemas/CourseSettings"
        subjectId:
          $ref: "#/components/schemas/SubjectId"
        isArchived:
          $ref: "#/components/schemas/CourseIsArchived"
        category:
          $ref: "#/components/schemas/CourseCategory"
        categoryCover:
          $ref: "#/components/schemas/CourseCategoryCover"
    Paging:
      type: object
      additionalProperties: false
      required: [ limit, offset, totalCount ]
      properties:
        limit:
          type: integer
          format: int32
          minimum: 1
          example: 25
        offset:
          type: integer
          format: int32
          minimum: 0
          example: 0
        totalCount:
          type: integer
          format: int32
          minimum: 0
          example: 1
    ListStudentCoursesResponse:
      type: object
      additionalProperties: false
      required: [ items, paging ]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CourseSummaryItem"
        paging:
          $ref: "#/components/schemas/Paging"
    UserId:
      type: string
      format: uuid
      description: Unique identifier of the user.
      x-re:
        observation:
          notes: >
            "00000000-0000-0000-0000-000000000000" is reserved
            for the System user.
        notes: >
          This UUID is the primary identifier used to reference the user
          on backend DB.
      example: "00000000-0000-0000-0000-000000000000"
    UniversityEmail:
      type: string
      format: email
      x-re:
        observation:
          notes: >
            Most student emails use the edu.centraluniversity.ru domain,
            but other domains may occur (e.g., gmail.com) in rare cases.
            University staff emails use centraluniversity.ru domain.
      example: "i.ivanov@edu.centraluniversity.ru"
    TimeAccount:
      type: string
      minLength: 3
      maxLength: 22
      pattern: "^[a-z][a-z0-9._-]{2,21}$"
      description: Username in TiMe messenger (T-Bank's fork of Mattermost).
      externalDocs:
        # yamllint disable-line rule:line-length
        url: https://docs.mattermost.com/end-user-guide/preferences/manage-your-profile.html#:~:text=message%2E-,Username
        description: Username constraints from Official Mattermost docs.
      example: "i.ivanov"
    StudyLevel:
      type: string
      description: Student’s current education level.
      x-re:
        status:
          completeness: full
          confidence: high
          notes: Enum seems to be complete as of observedAsOf.
        observation:
          observedAsOf: 2026-03-27
        enum:
          descriptions:
            "none": Non-enrolled user.
            "bachelor": Bachelor student.
            "master": Master student.
            "dpo": Supplementary vocational education student.
            "dpoMaster": Supplementary master vocational education student.
      enum:
        - none
        - bachelor
        - master
        - dpo
        - dpoMaster
      example: "bachelor"
    CurrentStudentResponse:
      type: object
      additionalProperties: false
      required: [ id, lastName, firstName, middleName, universityEmail,
                  timeAccount, studyStartYear, studyLevel, lateDaysBalance ]
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        lastName:
          type: string
